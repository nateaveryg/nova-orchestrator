# CENTRALIZED ENTERPRISE POLICY - DO NOT MODIFY LOCALLY
organization: "google-enterprise-demo"
project_id: "nova-orchestrator-prod"

telemetry:
  enabled: true
  destination: "gcp_cloud_logging"
  audit_level: "VERBOSE"

governance:
  # Explicitly define which agent tools are permitted on developer machines
  allowed_tools:
    - "file_reader"
    - "file_writer"
    - "git_operations"
    - "security_scanner"
  
  # Explicitly block high-risk agent behaviors
  restricted_tools:
    - "shell_execution"      # PREVENTS AGENT FROM RUNNING TERMINAL COMMANDS
    - "network_request"      # PREVENTS UNAUTHORIZED DATA EXFILTRATION
